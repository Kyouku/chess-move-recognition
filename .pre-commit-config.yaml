# === Pre-commit hooks configuration for Chess Move Recognition project ===
# This file ensures code quality and consistency on every commit.

repos:
  # --- Code Formatting (Black) ---
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        name: Black code formatter
        language_version: python3.12
        args: [ --line-length=100, --target-version=py312 ]

  # --- Import Sorting (isort) ---
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports
        args: [ --profile=black ]

  # --- Linting (flake8) ---
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        name: Lint with Flake8
        additional_dependencies: [ flake8-bugbear ]
        args: [ --max-line-length=100, --ignore=E203 ]

  # --- Type Checking (mypy) ---
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: Static type checking with mypy
        args: [ --ignore-missing-imports, --show-error-codes, --python-version=3.12 ]

  # --- YAML & JSON Syntax Checks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
